# GitHub Actions CI — runs automatically on GitHub's servers.
# Goal: prove both Docker images BUILD successfully before code is merged.
# (Building the frontend image also runs `npm run build`, catching broken
#  React/JS code.)

name: CI

# When should this run?
on:
  pull_request:            # on every PR (any branch -> any branch)
  push:
    branches: [main]       # and on direct pushes to main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt all actions into Node.js 24

jobs:
  # --- Build checks (run on every PR and push to main) ------------------
  # These are the required status checks — a PR cannot be merged until
  # both of these pass.

  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest        # a fresh Linux machine provided by GitHub
    steps:
      # 1. Check out (download) the repo onto the runner.
      - uses: actions/checkout@v5
      # 2. Build the backend Docker image. Fails the job if the build fails.
      - name: docker build (backend)
        run: docker build -t farm-backend:ci ./backend

  # --- Build the frontend image ----------------------------------------
  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: docker build (frontend)
        run: docker build -t farm-frontend:ci ./frontend

  # --- Push to GHCR (main only) -----------------------------------------
  # Only runs after a merge to main (not on PRs).
  # Builds the image, pushes two tags to ghcr.io, then deletes old
  # versions keeping only the 5 most recent.
  #
  # Tags pushed:
  #   :latest          — always points to the newest build (used by Fly.io)
  #   :main-<sha>      — permanent snapshot for rollbacks (e.g. main-a1b2c3d)

  push-backend:
    name: Push backend to GHCR
    needs: build-backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write       # needed to push images and delete old versions
    steps:
      - uses: actions/checkout@v5

      # Generates the two tag strings automatically from the commit SHA.
      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/farm-app-backend
          tags: |
            type=raw,value=latest
            type=sha,prefix=main-,format=short

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      # Keep only the 5 newest image versions — delete anything older.
      - name: Delete old images (keep last 5)
        uses: actions/delete-package-versions@v5
        with:
          package-name: farm-app-backend
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: false
          token: ${{ secrets.GITHUB_TOKEN }}

  push-frontend:
    name: Push frontend to GHCR
    needs: build-frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/farm-app-frontend
          tags: |
            type=raw,value=latest
            type=sha,prefix=main-,format=short

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}

      - name: Delete old images (keep last 5)
        uses: actions/delete-package-versions@v5
        with:
          package-name: farm-app-frontend
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: false
          token: ${{ secrets.GITHUB_TOKEN }}

  # --- Deploy to Fly.io (main only) -------------------------------------
  # Runs after images are pushed to GHCR. Tells Fly.io to pull the
  # pre-built :latest image — no rebuild on Fly.io's side.
  # Requires FLY_API_TOKEN to be set in GitHub repo secrets.

  deploy-backend:
    name: Deploy backend to Fly.io
    needs: push-backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: fly deploy --image ghcr.io/${{ github.repository_owner }}/farm-app-backend:latest --app ${{ vars.FLY_APP_BACKEND }}
        working-directory: ./backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-frontend:
    name: Deploy frontend to Fly.io
    needs: push-frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: fly deploy --image ghcr.io/${{ github.repository_owner }}/farm-app-frontend:latest --app ${{ vars.FLY_APP_FRONTEND }}
        working-directory: ./frontend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
