services:
  # --- Backend (FastAPI) ------------------------------------------------
  # Render builds this from the Dockerfile in ./backend.
  # Free tier: sleeps after 15 min of inactivity, wakes on next request.
  - type: web
    name: farm-app-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: MONGO_URL
        sync: false          # set this manually in the Render dashboard (it's a secret)
      - key: DB_NAME
        value: farm_app
      - key: FRONTEND_URL
        value: https://farm-app-frontend.onrender.com

  # --- Frontend (React static site) ------------------------------------
  # Render runs the build command, then serves the output folder.
  # Static sites are always on — no sleep, no cold starts.
  - type: web
    name: farm-app-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://farm-app-backend.onrender.com
    # Single-page app routing: serve index.html for all paths so
    # React Router (and direct URL access) works correctly.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
