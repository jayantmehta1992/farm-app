# nginx config for serving the built React app.

server {
    listen 80;
    server_name _;

    # Where the built static files live (copied in by the Dockerfile).
    root /usr/share/nginx/html;
    index index.html;

    # Single-Page App routing: if a requested file/folder doesn't exist,
    # fall back to index.html so React Router (or direct URLs) still work.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
